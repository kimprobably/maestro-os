_version = 1

[workflow]
graph = "live-enrichment.fabro"

[run]
goal = "Implement Consumer Radar live discovery and enrichment with strict real-data gates"

[run.inputs]
app_dir = "apps/generated-consumer-app-radar"
real_mode = true
allow_fixture_fallback = false
minimum_live_apps = 8
minimum_review_samples = 12
minimum_social_examples = 8
minimum_active_reviews = 2

[run.sandbox]
provider = "daytona"
preserve = true
stop_on_terminal = true

[run.sandbox.env]
APIFY_TOKEN = "{{ env.APIFY_TOKEN }}"
APIFY_APPSTORE_ACTOR = "crawlerbros/appstore-scraper"
APIFY_TIKTOK_ACTOR = "clockworks/tiktok-scraper"
APIFY_INSTAGRAM_ACTOR = "apify/instagram-scraper"
OPENROUTER_API_KEY = "{{ env.OPENROUTER_API_KEY }}"

[run.sandbox.daytona]
auto_stop_interval = 60
