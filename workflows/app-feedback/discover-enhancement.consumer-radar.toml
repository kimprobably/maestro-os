_version = 1

[workflow]
graph = "discover-enhancement.fabro"

[run]
goal = "Use eval-driven development to discover the real Consumer Radar enhancement workflow required by product feedback"

[run.inputs]
app_dir = "apps/generated-consumer-app-radar"
feedback_path = "feedback/consumer-radar-product-feedback.md"
target_adapter = "consumer-radar"
generated_workflow = "workflows/consumer-radar/live-enrichment.fabro"
generated_run_config = "workflows/consumer-radar/live-enrichment.toml"
real_mode = true
allow_fixture_fallback = false
execute_generated_workflow = false
eval_driven_development = true
test_driven_development = true
minimum_spec_candidates = 3
minimum_architecture_candidates = 2
minimum_workflow_candidates = 2
minimum_eval_score = 0.78
max_eval_regression = 0.05
minimum_active_reviews = 2
require_simplification = true

[run.sandbox]
provider = "daytona"
preserve = true
stop_on_terminal = true

[run.sandbox.daytona]
auto_stop_interval = 60
