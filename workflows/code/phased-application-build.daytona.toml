_version = 1

[workflow]
graph = "phased-application-build.fabro"

[run]
goal = "Build an application from a goal or spec through reusable phased implementation and verification"

[run.inputs]
goal_path = "specs/factory/vague-goal.md"
app_dir = "apps/generated-phased-app"

[run.sandbox]
provider = "daytona"

[run.sandbox.daytona]
auto_stop_interval = 30
