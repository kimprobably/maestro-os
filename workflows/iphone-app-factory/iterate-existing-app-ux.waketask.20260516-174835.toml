_version = 1

[workflow]
graph = "iterate-existing-app-ux.fabro"

[run]
goal = "Iterate on an existing iPhone app UX with private design research, adversarial design options, hosted iOS validation, and postmortem learning capture"

[run.metadata]
factory = "iphone-app-ux-studio"
app = "waketask"
topic = "task-alarm-clock"
control_plane = "railway"

[run.inputs]
repo_url = "https://github.com/kimprobably/waketask-ios.git"
base_branch = "main"
run_branch = "ux-studio/waketask-20260516-174835"
app_name = "WakeTask"
bundle_id = "com.keen.waketask"
app_dir = "apps/waketask-ios"
app_domain = "task_alarm"
target_audience = "heavy sleepers and professionals who need an alarm they cannot dismiss without meaningful wake-up engagement"
design_goal = "Improve WakeTask first-run, alarm setup, wake challenge, and history/streak UX using competitor evidence, stored screenshots, adversarial design directions, and hosted iOS validation"
max_competitors = "12"
use_mobbin_mcp = "true"
use_design_corpus = "true"
design_corpus_write_mode = "private"
selected_direction_mode = "automatic"
ios_validation_mode = "github"
allow_macos_deferred = "false"
fabro_server = "https://fabro-maestro-production.up.railway.app/api/v1"

[run.sandbox]
provider = "daytona"
preserve = false
stop_on_terminal = true

[run.sandbox.daytona]
auto_stop_interval = 30
network = "allow_all"

[run.sandbox.env]
FABRO_SERVER = "https://fabro-maestro-production.up.railway.app/api/v1"
FABRO_DEV_TOKEN = "{{ env.FABRO_DEV_TOKEN }}"
UX_REPO_URL = "https://github.com/kimprobably/waketask-ios.git"
UX_BASE_BRANCH = "main"
UX_RUN_BRANCH = "ux-studio/waketask-20260516-174835"
UX_RUN_ID = "ux-studio/waketask-20260516-174835"
UX_APP_DIR = "apps/waketask-ios"
UX_APP_DOMAIN = "task_alarm"
UX_SCREEN_TYPE = "task_alarm"
UX_TARGET_AUDIENCE = "heavy sleepers and professionals who need an alarm they cannot dismiss without meaningful wake-up engagement"
UX_USE_MOBBIN_MCP = "true"
UX_IOS_VALIDATION_MODE = "github"
UX_ALLOW_MACOS_DEFERRED = "false"
APP_DIR = "apps/waketask-ios"
APIFY_TOKEN = "{{ env.APIFY_TOKEN }}"
GITHUB_TOKEN = "{{ env.GITHUB_TOKEN }}"
GH_TOKEN = "{{ env.GH_TOKEN }}"
OPENROUTER_API_KEY = "{{ env.OPENROUTER_API_KEY }}"
CLAUDE_CODE_OAUTH_TOKEN = "{{ env.CLAUDE_CODE_OAUTH_TOKEN }}"
CLAUDE_CODE_CREDENTIALS_JSON_BASE64 = "{{ env.CLAUDE_CODE_CREDENTIALS_JSON_BASE64 }}"
CODEX_AUTH_JSON_BASE64 = "{{ env.CODEX_AUTH_JSON_BASE64 }}"
CODEX_MCP_CREDENTIALS_JSON_BASE64 = "{{ env.CODEX_MCP_CREDENTIALS_JSON_BASE64 }}"

[run.artifacts]
include = [
  ".workflow/iphone-app-ux-studio/**",
  ".workflow/iphone-app-factory/**",
  "reports/ios/**",
  ".github/workflows/**",
]
