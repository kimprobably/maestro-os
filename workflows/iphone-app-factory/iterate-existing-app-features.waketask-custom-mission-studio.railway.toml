_version = 1

[workflow]
graph = "iterate-existing-app-features.fabro"

[run]
goal = "Implement WakeTask's custom mission studio after loud alarm sound work lands"

[run.metadata]
factory = "iphone-app-feature-iteration"
control_plane = "railway"
app = "waketask"
topic = "custom-mission-studio"

[run.inputs]
repo_url = "https://github.com/kimprobably/waketask-ios.git"
base_branch = "feature/waketask-loud-sound-lab-20260519"
run_branch = "feature/waketask-custom-mission-studio-20260519"
app_name = "WakeTask"
bundle_id = "com.keen.waketask"
app_dir = "apps/waketask-ios"
app_domain = "task_alarm"
target_audience = "Heavy sleepers and consumer iPhone users who want funny, visual, configurable wake-up challenges without a complicated setup flow"
feature_goal = "Make WakeTask's mission setup feel obvious and expandable: a custom mission studio with funny visual templates, user-defined challenge names/instructions, previewable completion criteria, AI-suggested copy where credentials are available, and validation rules that keep dismiss-blocking behavior reliable."
required_capabilities = "custom_mission_template_library,user_defined_mission_copy,mission_preview_and_criteria,ai_suggested_mission_ideas,custom_mission_validation_rules"
context_paths = "contexts/iphone-app-factory/waketask,contexts/iphone-app-factory/waketask/screenshots"
max_competitors = "12"
use_mobbin_mcp = "true"
use_design_corpus = "true"
ios_validation_mode = "github"
allow_macos_deferred = "false"
fabro_server = "https://fabro-maestro-production.up.railway.app/api/v1"

[run.sandbox]
provider = "daytona"
preserve = false
stop_on_terminal = true

[run.sandbox.daytona]
auto_stop_interval = 30
network = "allow_all"

[run.sandbox.env]
FABRO_SERVER = "https://fabro-maestro-production.up.railway.app/api/v1"
FABRO_DEV_TOKEN = "{{ env.FABRO_DEV_TOKEN }}"
APP_DIR = "apps/waketask-ios"
UX_APP_DIR = "apps/waketask-ios"
UX_REPO_URL = "https://github.com/kimprobably/waketask-ios.git"
UX_BASE_BRANCH = "feature/waketask-loud-sound-lab-20260519"
UX_RUN_BRANCH = "feature/waketask-custom-mission-studio-20260519"
UX_RUN_ID = "feature/waketask-custom-mission-studio-20260519"
FEATURE_WORKFLOW_ROOT = ".workflow/existing-app-feature"
FEATURE_CONTEXT_PATHS = "contexts/iphone-app-factory/waketask,contexts/iphone-app-factory/waketask/screenshots"
FEATURE_REQUIRED_CAPABILITIES = "custom_mission_template_library,user_defined_mission_copy,mission_preview_and_criteria,ai_suggested_mission_ideas,custom_mission_validation_rules"
FEATURE_ALLOW_CI_DEFERRED = "false"
UX_USE_MOBBIN_MCP = "true"
UX_IOS_VALIDATION_MODE = "github"
UX_ALLOW_MACOS_DEFERRED = "false"
APIFY_TOKEN = "{{ env.APIFY_TOKEN }}"
GITHUB_TOKEN = "{{ env.GITHUB_TOKEN }}"
GH_TOKEN = "{{ env.GH_TOKEN }}"
OPENROUTER_API_KEY = "{{ env.OPENROUTER_API_KEY }}"
CLAUDE_CODE_OAUTH_TOKEN = "{{ env.CLAUDE_CODE_OAUTH_TOKEN }}"
CLAUDE_CODE_CREDENTIALS_JSON_BASE64 = "{{ env.CLAUDE_CODE_CREDENTIALS_JSON_BASE64 }}"
CODEX_AUTH_JSON_BASE64 = "{{ env.CODEX_AUTH_JSON_BASE64 }}"
CODEX_MCP_CREDENTIALS_JSON_BASE64 = "{{ env.CODEX_MCP_CREDENTIALS_JSON_BASE64 }}"

[run.artifacts]
include = [
  ".workflow/existing-app-feature/**",
  ".workflow/object-proof-program/**",
  "apps/waketask-ios/**",
  "reports/ios/**",
  "reports/evals/**",
  ".github/workflows/**",
]
