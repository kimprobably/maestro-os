_version = 1

[workflow]
graph = "workflow-builder.fabro"

[run]
goal = "Build the Consumer App Radar workflow and the reusable app-feedback enhancement workflow, then validate both"

[run.inputs]
target = "consumer-app-radar"
output_root = "."

[run.sandbox]
provider = "daytona"
preserve = true
stop_on_terminal = true

[run.sandbox.daytona]
auto_stop_interval = 60
