_version = 1

[workflow]
graph = "workflow-builder.fabro"

[run]
goal = "Build the Consumer App Radar workflow-builder output, then validate it"

[run.inputs]
target = "consumer-app-radar"
output_root = "."

[run.sandbox]
provider = "daytona"
preserve = true
stop_on_terminal = true

[run.sandbox.daytona]
auto_stop_interval = 60

[run.sandbox.daytona.snapshot]
name = "maestro-dev"
dockerfile = """
FROM ubuntu:24.04
RUN apt-get update && apt-get install -y bash ca-certificates curl git jq nodejs npm ripgrep && rm -rf /var/lib/apt/lists/*
"""
