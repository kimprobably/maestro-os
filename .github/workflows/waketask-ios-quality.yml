name: WakeTask iOS Quality

on:
  push:
    branches:
      - "recovery/waketask-01KRK15"
    paths:
      - "apps/waketask-iphone/**"
      - ".github/workflows/waketask-ios-quality.yml"
  pull_request:
    paths:
      - "apps/waketask-iphone/**"
      - ".github/workflows/waketask-ios-quality.yml"
  workflow_dispatch:

jobs:
  ios-quality:
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/waketask-iphone
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.2.app || sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      - name: Install Swift quality tools
        run: |
          brew update
          brew install swiftlint swiftformat ripgrep gitleaks

      - name: Install Qlty CLI
        uses: qltysh/qlty-action/install@v2

      - name: Install Appium XCUITest driver
        run: |
          npm install -g appium
          appium driver install xcuitest || appium driver update xcuitest || true

      - name: iOS quality gates
        env:
          IOS_QUALITY_REQUIRE_SECRETS: "0"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}
        run: ./scripts/ci/ios-quality.sh

      - name: Appium/XCUITest exploratory gates
        run: ./scripts/qa/appium-exploratory-tapper.sh

      - name: Upload iOS quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: waketask-ios-quality-report
          path: apps/waketask-iphone/reports/ios/ios-quality-report.json

      - name: Upload exploratory report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: waketask-appium-exploratory-report
          path: apps/waketask-iphone/reports/ios/appium-exploratory-report.json
