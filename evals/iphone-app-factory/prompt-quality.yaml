description: "iPhone App Factory prompt quality eval"

providers:
  - id: openrouter:anthropic/claude-haiku-4-5
    config:
      apiKeyEnvar: OPENROUTER_API_KEY
      temperature: 0
      max_tokens: 1200
      maxRetries: 0

evaluateOptions:
  maxConcurrency: 1

defaultTest:
  options:
    provider:
      id: openrouter:anthropic/claude-haiku-4-5
      config:
        apiKeyEnvar: OPENROUTER_API_KEY
        temperature: 0
        max_tokens: 1200

prompts:
  - |
    Evaluate whether this iPhone App Factory prompt suite is strong enough for overnight agentic app generation.

    Prompt registry:
    {{prompt_registry}}

    Golden cases:
    {{golden_cases}}

    Representative prompts:
    SPEC_CONSENSUS:
    {{spec_consensus}}

    ARCHITECTURE:
    {{architecture_consensus}}

    IMPLEMENT_INTEGRATION:
    {{implement_integration}}

    AI_UI_EXPLORER:
    {{ai_ui_explorer}}

    FINAL_CONSENSUS:
    {{final_consensus}}

    UX_EXISTING_APP_INTAKE:
    {{ux_existing_app_intake}}

    UX_MOBBIN_MCP_RESEARCH:
    {{ux_mobbin_mcp_research}}

    UX_DESIGN_TOURNAMENT_CONSENSUS:
    {{ux_design_tournament_consensus}}

    UX_SCREEN_SPEC:
    {{ux_screen_spec}}

    UX_SCREENSHOT_EVIDENCE_REVIEW:
    {{ux_screenshot_evidence_review}}

    UX_POSTMORTEM_LEARNING_CAPTURE:
    {{ux_postmortem_learning_capture}}

    Return valid JSON only, no markdown fences. It must match this shape:
    Return exactly one valid JSON object and nothing else. Do not include headings, prose, markdown fences, comments, or preambles. If you find gaps, put them in `critical_gaps`, `gaps`, or `risks`; never switch to markdown narrative.
    {
      "verdict": "APPROVE",
      "score": 0.0,
      "covered": ["spec_lab","boilerplate_reuse","ios_quality","appium_qa","mobbin_safety","release_hardening","mobbin_mcp","design_corpus","adversarial_design","screenshots","accessibility","postmortem"],
      "golden_case_results": [{"id":"case-id","pass":true,"reason":"short reason"}],
      "critical_gaps": [],
      "gaps": [{"id":"gap-id","severity":"low","reason":"short reason"}],
      "risks": [{"id":"risk-id","severity":"low","reason":"short reason"}],
      "required_artifacts": [".workflow/iphone-app-ux-studio/research/existing-app-intake.md",".workflow/iphone-app-ux-studio/research/mobbin-mcp-research.md",".workflow/iphone-app-ux-studio/design/tournament-consensus.json","reports/ios/screenshots/manifest.json",".workflow/iphone-app-ux-studio/postmortem.md"],
      "accepted_risk": false
    }

tests:
  - description: "Prompt suite covers adversarial spec, boilerplate reuse, iOS QA, Mobbin safety, and release gates"
    vars:
      prompt_registry: file://prompt-registry.json
      golden_cases: file://datasets/prompt-quality-golden.jsonl
      spec_consensus: file://../../prompts/iphone-app-factory/spec-consensus.md
      architecture_consensus: file://../../prompts/iphone-app-factory/architecture-consensus.md
      implement_integration: file://../../prompts/iphone-app-factory/implement-integration.md
      ai_ui_explorer: file://../../prompts/iphone-app-factory/ai-ui-explorer.md
      final_consensus: file://../../prompts/iphone-app-factory/final-consensus.md
      ux_existing_app_intake: file://../../prompts/iphone-app-factory/ux-existing-app-intake.md
      ux_mobbin_mcp_research: file://../../prompts/iphone-app-factory/ux-mobbin-mcp-research.md
      ux_design_tournament_consensus: file://../../prompts/iphone-app-factory/ux-design-tournament-consensus.md
      ux_screen_spec: file://../../prompts/iphone-app-factory/ux-screen-spec.md
      ux_screenshot_evidence_review: file://../../prompts/iphone-app-factory/ux-screenshot-evidence-review.md
      ux_postmortem_learning_capture: file://../../prompts/iphone-app-factory/ux-postmortem-learning-capture.md
    assert:
      - type: javascript
        value: |
          const parsed = JSON.parse(output);
          const requiredKeys = ["verdict", "score", "covered", "golden_case_results", "critical_gaps", "gaps", "risks", "required_artifacts", "accepted_risk"];
          for (const key of requiredKeys) {
            if (!(key in parsed)) return { pass: false, reason: `missing ${key}` };
          }
          if (!Array.isArray(parsed.covered)) return { pass: false, reason: "covered must be an array" };
          if (!Array.isArray(parsed.golden_case_results)) return { pass: false, reason: "golden_case_results must be an array" };
          if (!Array.isArray(parsed.critical_gaps)) return { pass: false, reason: "critical_gaps must be an array" };
          if (!Array.isArray(parsed.gaps)) return { pass: false, reason: "gaps must be an array" };
          if (!Array.isArray(parsed.risks)) return { pass: false, reason: "risks must be an array" };
          if (!Array.isArray(parsed.required_artifacts)) return { pass: false, reason: "required_artifacts must be an array" };
          if (parsed.accepted_risk !== false) return { pass: false, reason: "accepted_risk must be false for overnight runs" };
          const requiredCases = ["spec-lab", "boilerplate-first", "ios-qa", "mobbin-safe", "waketask-control-plane", "waketask-hosted-ios-evidence", "waketask-artifacts-metadata", "waketask-review-fan-in", "ux-existing-app-intake", "ux-mobbin-mcp-safe", "ux-design-tournament", "ux-screenshot-evidence", "ux-postmortem-learning"];
          const seenCases = new Set(parsed.golden_case_results.map((entry) => entry.id));
          for (const id of requiredCases) {
            if (!seenCases.has(id)) return { pass: false, reason: `missing golden case result ${id}` };
          }
          const requiredCoverage = ["spec_lab", "boilerplate_reuse", "ios_quality", "appium_qa", "mobbin_safety", "release_hardening", "mobbin_mcp", "design_corpus", "adversarial_design", "screenshots", "accessibility", "postmortem"];
          const seenCoverage = new Set(parsed.covered);
          for (const id of requiredCoverage) {
            if (!seenCoverage.has(id)) return { pass: false, reason: `missing coverage ${id}` };
          }
          const requiredArtifacts = [
            ".workflow/iphone-app-ux-studio/research/existing-app-intake.md",
            ".workflow/iphone-app-ux-studio/research/mobbin-mcp-research.md",
            ".workflow/iphone-app-ux-studio/design/tournament-consensus.json",
            "reports/ios/screenshots/manifest.json",
            ".workflow/iphone-app-ux-studio/postmortem.md",
          ];
          const artifactText = JSON.stringify(parsed.required_artifacts);
          for (const artifact of requiredArtifacts) {
            if (!artifactText.includes(artifact)) return { pass: false, reason: `missing required artifact ${artifact}` };
          }
          if (parsed.golden_case_results.some((entry) => entry.pass !== true)) {
            return { pass: false, reason: "one or more golden cases failed" };
          }
          if (parsed.critical_gaps.length > 0) {
            return { pass: false, reason: `critical gaps present: ${parsed.critical_gaps.join(", ")}` };
          }
          return true;
      - type: contains-all
        value: ["spec_lab", "boilerplate_reuse", "ios_quality", "appium_qa", "mobbin_safety", "release_hardening", "mobbin_mcp", "design_corpus", "adversarial_design", "screenshots", "accessibility", "postmortem", "required_artifacts", "risks"]
      - type: llm-rubric
        value: "The prompt suite should make quality reproducible across prompt registry, golden cases, adversarial review, deterministic gates, and final release criteria."
        threshold: 0.78

outputPath: .workflow/iphone-app-factory/evals/promptfoo-output.json
